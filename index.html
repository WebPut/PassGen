<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ── Character encoding & viewport ── -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cryptographically secure password generator using browser CPRNG">
    <title>🔐 PassGen — CPRNG Password Generator</title>

    <!-- ── Google Fonts: Inter for clean modern typography ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- ── CSS ── -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ═══════════════════════════════════════════ -->
    <!--  BACKGROUND DECOR (subtle animated blobs)  -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="bg-decor" aria-hidden="true">
        <div class="blob blob--1"></div>
        <div class="blob blob--2"></div>
        <div class="blob blob--3"></div>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!--  MAIN CONTAINER                           -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="container">

        <!-- ── Header ── -->
        <header class="header">
            <div class="logo-icon" aria-hidden="true">🔐</div>
            <h1 class="title">PassGen</h1>
            <p class="subtitle">
                Cryptographically secure passwords<br>
                <span class="highlight">CPRNG-powered</span> · Auto-copied · Up to 5,000 chars
            </p>
        </header>

        <!-- ── Generator Card ── -->
        <main class="card">
            <div class="card__inner">

                <!-- ── Input Row: length input + generate button ── -->
                <div class="input-row">
                    <div class="length-field">
                        <label for="password-length" class="length-field__label">
                            Password Length
                        </label>
                        <div class="length-field__input-wrapper">
                            <input
                                type="number"
                                id="password-length"
                                class="length-field__input"
                                placeholder="e.g. 32"
                                min="1"
                                max="5000"
                                value="32"
                                inputmode="numeric"
                                autocomplete="off"
                            >
                            <span class="length-field__suffix">chars</span>
                        </div>
                        <span class="length-field__hint" id="length-hint">
                            Min 1 · Max 5,000
                        </span>
                    </div>

                    <button
                        id="generate-btn"
                        class="btn-generate"
                        type="button"
                        aria-label="Generate password"
                    >
                        <span class="btn-generate__icon" aria-hidden="true">⚡</span>
                        <span class="btn-generate__text">Generate</span>
                    </button>
                </div>

                <!-- ── Password Output Area ── -->
                <div class="output-area" id="output-area">
                    <div class="output-area__password-wrapper">
                        <span
                            id="password-output"
                            class="output-area__password"
                            role="textbox"
                            aria-live="polite"
                            aria-label="Generated password"
                        >
                            Your password will appear here
                        </span>
                    </div>

                    <!-- Copy button (manual fallback) -->
                    <button
                        id="copy-btn"
                        class="btn-copy"
                        type="button"
                        aria-label="Copy password to clipboard"
                        title="Copy to clipboard"
                    >
                        <svg class="btn-copy__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>

                <!-- ── Info badges ── -->
                <div class="badges">
                    <span class="badge badge--cprng" title="Cryptographically Secure Pseudo-Random Number Generator">
                        🛡️ CPRNG
                    </span>
                    <span class="badge badge--auto-copy">
                        📋 Auto-copy
                    </span>
                </div>
            </div>
        </main>

        <!-- ── Toast notification ── -->
        <div
            id="toast"
            class="toast"
            role="status"
            aria-live="assertive"
            aria-atomic="true"
        >
            <span class="toast__icon" aria-hidden="true">✅</span>
            <span class="toast__message">Copied to clipboard!</span>
        </div>

        <!-- ── Footer ── -->
        <footer class="footer">
            <p class="footer__text">
                Uses <code>crypto.getRandomValues()</code> — the browser's built-in CPRNG
            </p>
        </footer>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!--  JAVASCRIPT                                -->
    <!-- ═══════════════════════════════════════════ -->
    <script src="js/script.js"></script>
</body>
</html>
